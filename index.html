<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Primeiro Projeto</title>
    <style>
        /* Mudar a cor do fundo */
        body {
            background-color: #e8f4f8; 
            font-family: 'Verdana', sans-serif; /* Alterar fonte */
            margin: 40px; /* Margem nas bordas da página */
        }

        /* Centralizar apenas o título */
        h1 {
            text-align: center;
            color: #333;
        }

        /* Estilo do parágrafo */
        p {
            line-height: 1.6;
        }

        /* Criando o botão */
        .meu-botao {
            background-color: #2ecc71; /* Cor verde */
            color: white;
            padding: 12px 24px;
            text-decoration: none; /* Remove o sublinhado do link */
            border-radius: 8px;
            display: inline-block;
        }

        /* Efeito Hover (ao passar o mouse) */
        .meu-botao:hover {
            background-color: #27ae60; /* Verde mais escuro */
            cursor: pointer;
        }

        /* Ajuste simples na imagem */
        img {
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            display: block;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Desafio do Dionatan</h1>
    
    <p>Desafio mais que conluido!!</p>

    <h3>Metas:</h3>
    <ul>
        <li>Aprender a estruturar sites</li>
        <li>Dominar o estilo com CSS</li>
        <li>Criar projetos </li>
    </ul>

    <img src="professor forte.jpg" alt="Imagem Aleatória">

    <br>

    <a href="https://github.com" class="meu-botao">Visitar meu perfil</a>

</body>
</html>
